version: 2

models:
  - name: int_recomendacoes_por_fase
    description: "Tabela intermediaria que ranqueia alimentos por fase do ciclo menstrual."
    columns:
      - name: fase_ciclo
        tests:
          - not_null

      - name: alimento
        tests:
          - not_null

      - name: nutriente_prioritario
        tests:
          - not_null

      - name: ranking
        tests:
          - not_null
